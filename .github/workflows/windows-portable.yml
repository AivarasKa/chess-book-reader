name: Windows Portable Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for package name (e.g. v0.2.0)"
        required: true

jobs:
  build-portable:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Launcher smoke check
        run: node packaging/windows-portable/launcher.cjs --check-only --ci-smoke

      - name: Package portable zip
        shell: powershell
        run: |
          $version = "${{ inputs.version }}"
          powershell -ExecutionPolicy Bypass -File packaging/windows-portable/package-portable.ps1 -VersionSuffix $version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChessBookReader-portable-win
          path: dist/portable-win/*.zip

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: dist/portable-win/*.zip
